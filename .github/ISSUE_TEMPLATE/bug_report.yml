name: Bug report
description: Something in Pelton isn't working as expected
labels: ["bug", "needs-triage"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to ...
        2. Click on ...
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Windows
        - Linux
    validations:
      required: true
  - type: input
    id: distro
    attributes:
      label: Linux distro and version
      description: Only if you selected Linux above.
      placeholder: e.g. Fedora 40
  - type: dropdown
    id: install_method
    attributes:
      label: How did you install Pelton
      options:
        - macOS .dmg
        - Windows installer (.exe/NSIS)
        - Fedora Copr (dnf copr enable + dnf install)
        - Downloaded .rpm directly
        - Built from source
        - Other
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Pelton version
      placeholder: e.g. v1.2.0
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste any relevant logs, stack traces, or screenshots.
