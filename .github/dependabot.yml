version: 2

updates:
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      go-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
    groups:
      frontend-dependencies:
        patterns:
          - "*"
    ignore:
      # typescript 7 (the native port) breaks svelte-check; hold at 6.x until the
      # svelte language tools support it.
      - dependency-name: "typescript"
        versions: [">=7.0.0"]
